name: Deploy SuiteCloud Project

on:
  workflow_dispatch:

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    # ── These two env vars are THE fix for the error ──
    env:
      SUITECLOUD_CI: 1
      SUITECLOUD_CI_PASSKEY: ${{ secrets.SDF_PASSPHRASE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --acceptSuiteCloudSDKLicense

      - name: Run Tests
        run: npm test

      # Decode the .p12 file stored as a base64 secret
      - name: Restore NetSuite Credentials
        run: |
          mkdir -p ~/.suitecloud-sdk
          echo "${{ secrets.CREDENTIALS_CI_P12_BASE64 }}" | base64 -d \
            > ~/.suitecloud-sdk/credentials_ci.p12
          chmod 600 ~/.suitecloud-sdk/credentials_ci.p12

      - name: Select NetSuite Auth ID
        run: npx suitecloud account:setup:ci --select "${{ secrets.NETSUITE_AUTH_ID }}"

      - name: Validate SDF Project
        run: npx suitecloud project:validate

      - name: Deploy to NetSuite
        run: npm run deploy
