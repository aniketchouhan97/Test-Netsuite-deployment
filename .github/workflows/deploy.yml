name: Deploy SuiteCloud Project

on:
  workflow_dispatch:

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --acceptsuitecloudsdklicense

      - name: Run Tests
        run: npm test

      - name: Setup NetSuite Authentication
        run: |
          npx suitecloud account:setup:ci \
            --authid "$NETSUITE_AUTH_ID" \
            --account "$NETSUITE_ACCOUNT_ID" \
            --token "$NETSUITE_TOKEN_ID" \
            --tokensecret "$NETSUITE_TOKEN_SECRET"
        env:
          NETSUITE_AUTH_ID: ${{ secrets.NETSUITE_AUTH_ID }}
          NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
          NETSUITE_TOKEN_ID: ${{ secrets.NETSUITE_TOKEN_ID }}
          NETSUITE_TOKEN_SECRET: ${{ secrets.NETSUITE_TOKEN_SECRET }}
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}

      - name: Deploy to NetSuite
        run: npm run deploy -- --account "$NETSUITE_ACCOUNT_ID" --authid "$NETSUITE_AUTH_ID"
        env:
          NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
          NETSUITE_AUTH_ID: ${{ secrets.NETSUITE_AUTH_ID }}
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}
