name: Deploy SuiteCloud Project

on:
  workflow_dispatch:

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --acceptSuiteCloudSDKLicense

      - name: Run Tests
        run: npm test

      - name: Setup NetSuite Authentication
        run: |
          echo "$NETSUITE_PRIVATE_KEY" > private.pem
          npx suitecloud account:setup:ci \
            --authid "$NETSUITE_AUTH_ID" \
            --account "$NETSUITE_ACCOUNT_ID" \
            --certificateid "$NETSUITE_CERTIFICATE_ID" \
            --privatekeypath ./private.pem
        env:
          NETSUITE_AUTH_ID: ${{ secrets.NETSUITE_AUTH_ID }}
          NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
          NETSUITE_CERTIFICATE_ID: ${{ secrets.NETSUITE_CERTIFICATE_ID }}
          NETSUITE_PRIVATE_KEY: ${{ secrets.NETSUITE_PRIVATE_KEY }}
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}

      - name: Deploy to NetSuite
        run: npm run deploy -- --account "$NETSUITE_ACCOUNT_ID" --authid "$NETSUITE_AUTH_ID"
        env:
          NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
          NETSUITE_AUTH_ID: ${{ secrets.NETSUITE_AUTH_ID }}
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}
