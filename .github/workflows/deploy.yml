name: Deploy SuiteCloud Project

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for deployment'
        required: true
        type: choice
        default: 'sandbox'
        options:
          - sandbox
          - production

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      SUITECLOUD_CI: 1
      SUITECLOUD_CI_PASSKEY: ${{ secrets.SDF_PASSPHRASE }}
      SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --acceptSuiteCloudSDKLicense

      - name: Run Tests
        run: npm test

      - name: Setup NetSuite Authentication
        run: |
          echo "$NETSUITE_PRIVATE_KEY" > private.pem
          npx suitecloud account:setup:ci \
            --authid "$NETSUITE_AUTH_ID" \
            --account "$NETSUITE_ACCOUNT_ID" \
            --certificateid "$NETSUITE_CERTIFICATE_ID" \
            --privatekeypath ./private.pem
        env:
          NETSUITE_AUTH_ID: ${{ secrets.NETSUITE_AUTH_ID }}
          NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
          NETSUITE_CERTIFICATE_ID: ${{ secrets.NETSUITE_CERTIFICATE_ID }}
          NETSUITE_PRIVATE_KEY: ${{ secrets.NETSUITE_PRIVATE_KEY }}
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}

      - name: Validate SDF Project
        run: npx suitecloud project:validate
        env:
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}

      - name: Deploy to NetSuite
        run: npm run deploy
        env:
          SDF_PASSPHRASE: ${{ secrets.SDF_PASSPHRASE }}
